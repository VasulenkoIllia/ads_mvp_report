services:
  postgres:
    image: postgres:16-alpine
    container_name: ads_mvp_report_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ads_mvp_report
      POSTGRES_USER: ads_mvp_report
      POSTGRES_PASSWORD: ads_mvp_report
      TZ: Europe/Kyiv
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ads_mvp_report -d ads_mvp_report']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ads_mvp_report_pg_data:/var/lib/postgresql/data

volumes:
  ads_mvp_report_pg_data:
